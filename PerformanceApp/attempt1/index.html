<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Keyword Counter</title>
  <style>
    :root {
      font-family: Arial, sans-serif;
      color: #1a1a1a;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f5f7fb;
    }

    .card {
      width: min(560px, 92vw);
      background: #ffffff;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin-top: 0;
      margin-bottom: 16px;
      font-size: 1.4rem;
    }

    .field {
      display: grid;
      gap: 8px;
      margin-bottom: 16px;
    }

    label {
      font-weight: 600;
    }

    input[type="file"],
    input[type="text"] {
      width: 100%;
      box-sizing: border-box;
      padding: 10px;
      border: 1px solid #c8cdd8;
      border-radius: 8px;
      font-size: 1rem;
    }

    button {
      border: 0;
      border-radius: 8px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 1rem;
      color: #ffffff;
      background: #2d63f3;
    }

    button:disabled {
      cursor: not-allowed;
      background: #9bb3f8;
    }

    .result {
      margin-top: 16px;
      font-size: 1.05rem;
      font-weight: 600;
    }

    .error {
      color: #b42318;
      font-weight: 600;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Text File Keyword Counter</h1>

    <div class="field">
      <label for="fileInput">Choose a text file</label>
      <input id="fileInput" type="file" accept=".txt,text/plain" />
    </div>

    <div class="field">
      <label for="keywordInput">Keyword</label>
      <input id="keywordInput" type="text" placeholder="Enter a word" />
    </div>

    <button id="countButton" type="button">Count Keyword</button>

    <p id="result" class="result" aria-live="polite"></p>
    <p id="error" class="error" aria-live="polite"></p>
  </main>

  <script>
    const fileInput = document.getElementById("fileInput");
    const keywordInput = document.getElementById("keywordInput");
    const countButton = document.getElementById("countButton");
    const resultEl = document.getElementById("result");
    const errorEl = document.getElementById("error");

    function escapeRegex(text) {
      return text.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }

    countButton.addEventListener("click", async () => {
      resultEl.textContent = "";
      errorEl.textContent = "";

      const file = fileInput.files[0];
      const keyword = keywordInput.value.trim();

      if (!file) {
        errorEl.textContent = "Please choose a text file.";
        return;
      }

      if (!keyword) {
        errorEl.textContent = "Please enter a keyword.";
        return;
      }

      try {
        const text = await file.text();
        const pattern = new RegExp(`\\b${escapeRegex(keyword)}\\b`, "gi");
        const matches = text.match(pattern);
        const count = matches ? matches.length : 0;

        resultEl.textContent = `"${keyword}" appears ${count} time${count === 1 ? "" : "s"} in "${file.name}".`;
      } catch (error) {
        errorEl.textContent = "Could not read the selected file.";
      }
    });
  </script>
</body>
</html>
